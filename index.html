<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>售前演示项目</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: linear-gradient(135deg, #0f172a, #1e293b);
            color: #e2e8f0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .container {
            text-align: center;
            padding: 40px;
        }
        h1 { font-size: 2rem; margin-bottom: 0.5rem; }
        p { color: #94a3b8; margin-bottom: 2rem; }
        .projects {
            display: flex;
            gap: 1.5rem;
            flex-wrap: wrap;
            justify-content: center;
        }
        .card {
            background: #1e293b;
            border-radius: 12px;
            padding: 2rem;
            width: 260px;
            text-decoration: none;
            color: #e2e8f0;
            transition: transform 0.3s, box-shadow 0.3s;
            border: 1px solid #334155;
        }
        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 35px rgba(0,0,0,0.3);
            border-color: #3b82f6;
        }
        .card h2 { font-size: 1.2rem; margin-bottom: 0.5rem; }
        .card p { font-size: 0.85rem; color: #94a3b8; }
        .emoji { font-size: 2.5rem; margin-bottom: 1rem; }
    </style>
</head>
<body>
    <div class="container">
        <h1>📂 售前工程师项目展示</h1>
        <p>哈尔滨工业大学 · 信息管理与信息系统</p>
        <div class="projects">
            <a href="saas-landing.html" class="card">
                <div class="emoji">🖥️</div>
                <h2>SaaS 产品落地页</h2>
                <p>“智析”数据协作平台官网，产品价值传递与演示实践</p>
            </a>
            <a href="dashboard.html" class="card">
                <div class="emoji">📊</div>
                <h2>数据看板</h2>
                <p>企业数字化转型成效看板，数据呈现与交互演示</p>
            </a>
        </div>
    </div>
</body>
</html>
